services:
  - type: web
    name: nepse-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: nepse-cache
      mountPath: /opt/render/project/src/cache
      sizeGB: 1
